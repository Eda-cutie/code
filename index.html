<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Flowchart AI</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: transparent; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fade-in 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const modules = {
            reg: { 
                title: "User Registration", 
                icon: "UserPlus", 
                desc: "Users create an account by providing personal details. The system validates and stores this information securely.", 
                color: "text-blue-500", 
                bg: "bg-blue-500/10", 
                border: "border-blue-500/50", 
                ring: "ring-blue-500/30",
                aiPrompt: "Suggest 3 security best practices and 2 user experience improvements for a User Registration module in a complaint management system." 
            },
            login: { 
                title: "User Login", 
                icon: "LogIn", 
                desc: "Registered users log in using their credentials to access the complaint dashboard.", 
                color: "text-indigo-500", 
                bg: "bg-indigo-500/10", 
                border: "border-indigo-500/50", 
                ring: "ring-indigo-500/30",
                aiPrompt: "What are the modern authentication standards (like MFA or SSO) that should be integrated into a professional login system?" 
            },
            sub: { 
                title: "Complaint Submission", 
                icon: "FileText", 
                desc: "Users submit complaints through a form by selecting categories and providing descriptions.", 
                color: "text-purple-500", 
                bg: "bg-purple-500/10", 
                border: "border-purple-500/50", 
                ring: "ring-purple-500/30",
                aiPrompt: "Suggest a list of effective complaint categories and subcategories for a general service-based organization." 
            },
            admin: { 
                title: "Admin Management", 
                icon: "Shield", 
                desc: "Administrators view all complaints, manage categories, and update resolution status.", 
                color: "text-red-500", 
                bg: "bg-red-500/10", 
                border: "border-red-500/50", 
                ring: "ring-red-500/30",
                aiPrompt: "Propose a dashboard layout for an administrator handling thousands of complaints. What KPIs should be displayed?" 
            },
            track: { 
                title: "Complaint Tracking", 
                icon: "Activity", 
                desc: "Users can view and track the real-time status of their submitted complaints.", 
                color: "text-amber-500", 
                bg: "bg-amber-500/10", 
                border: "border-amber-500/50", 
                ring: "ring-amber-500/30",
                aiPrompt: "How can we provide 'delightful' status updates to users during a long complaint resolution process to reduce anxiety?" 
            },
            hist: { 
                title: "Complaint History", 
                icon: "Clock", 
                desc: "The system maintains a comprehensive record of all historical complaints for monitoring.", 
                color: "text-teal-500", 
                bg: "bg-teal-500/10", 
                border: "border-teal-500/50", 
                ring: "ring-teal-500/30",
                aiPrompt: "What data visualization techniques are best for showing complaint trends over a 12-month period?" 
            }
        };

        const IconComp = ({ name, className }) => {
            // When using the Lucide CDN, icons are available on the global 'lucide' object
            const Icon = lucide[name];
            if (!Icon) return null;
            return <Icon className={className} />;
        };

        function App() {
            const [activeId, setActiveId] = useState('reg');
            const [aiAnalysis, setAiAnalysis] = useState({});
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const apiKey = ""; // Handled by environment

            const generateAiInsights = async (id) => {
                setLoading(true);
                setError(null);
                const prompt = modules[id].aiPrompt;
                
                const fetchWithRetry = async (retries = 0) => {
                    try {
                        const response = await fetch(
                            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                            {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: prompt }] }],
                                    systemInstruction: { 
                                        parts: [{ text: "You are a software architect expert. Provide concise, professional, and actionable advice in bullet points. Keep it under 150 words." }] 
                                    }
                                })
                            }
                        );

                        if (!response.ok) throw new Error('Failed to fetch from Gemini');
                        
                        const data = await response.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        setAiAnalysis(prev => ({ ...prev, [id]: text }));
                    } catch (err) {
                        if (retries < 5) {
                            const delay = Math.pow(2, retries) * 1000;
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return fetchWithRetry(retries + 1);
                        }
                        setError("Could not generate AI insights. Please check API settings.");
                    } finally {
                        setLoading(false);
                    }
                };

                await fetchWithRetry();
            };

            return (
                <div className="min-h-screen p-4 sm:p-8 bg-transparent font-sans text-gray-900">
                    <div className="max-w-5xl mx-auto">
                        <div className="text-center mb-12">
                            <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight mb-2">
                                Complaint Management <span className="text-blue-600">Flowchart</span>
                            </h1>
                            <p className="text-gray-500 font-medium italic">Interactive & AI-Enhanced Architecture</p>
                        </div>
                        
                        {/* Interactive Nodes */}
                        <div className="flex flex-wrap justify-center gap-4 mb-12">
                            {Object.entries(modules).map(([id, mod]) => (
                                <button 
                                    key={id}
                                    onClick={() => { setActiveId(id); setError(null); }}
                                    className={`group flex flex-col items-center justify-center p-4 w-40 rounded-2xl border-2 transition-all duration-300 ${
                                        activeId === id 
                                            ? `${mod.border} bg-white shadow-xl scale-105 ring-4 ${mod.ring}` 
                                            : 'border-gray-100 bg-white/60 hover:border-gray-200 hover:shadow-md'
                                    }`}
                                >
                                    <div className={`p-3 rounded-full mb-2 ${activeId === id ? mod.bg : 'bg-gray-50'}`}>
                                        <IconComp name={mod.icon} className={`w-6 h-6 ${activeId === id ? mod.color : 'text-gray-400'}`} />
                                    </div>
                                    <span className={`text-xs font-bold text-center ${activeId === id ? 'text-gray-900' : 'text-gray-500'}`}>
                                        {mod.title}
                                    </span>
                                </button>
                            ))}
                        </div>

                        {/* Detail Panel */}
                        <div className="relative rounded-3xl border border-gray-100 bg-white/90 backdrop-blur-xl shadow-2xl overflow-hidden transition-all duration-500 p-8 sm:p-10">
                            <div className="flex flex-col md:flex-row gap-8 items-start">
                                <div className={`p-6 rounded-2xl ${modules[activeId].bg} border ${modules[activeId].border}`}>
                                    <IconComp name={modules[activeId].icon} className={`w-12 h-12 ${modules[activeId].color}`} />
                                </div>
                                
                                <div className="flex-1">
                                    <div className="flex items-center gap-3 mb-3">
                                        <h2 className="text-3xl font-bold text-gray-900">{modules[activeId].title}</h2>
                                        <span className={`text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-widest ${modules[activeId].bg} ${modules[activeId].color}`}>
                                            Module detail
                                        </span>
                                    </div>
                                    <p className="text-gray-600 text-lg leading-relaxed mb-8">
                                        {modules[activeId].desc}
                                    </p>

                                    {/* AI Section */}
                                    <div className="pt-6 border-t border-gray-100">
                                        <div className="flex items-center justify-between mb-4">
                                            <div className="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-widest">
                                                <lucide.Sparkles className="w-4 h-4 text-amber-500" />
                                                Architect Insights
                                            </div>
                                            
                                            {!aiAnalysis[activeId] && (
                                                <button
                                                    onClick={() => generateAiInsights(activeId)}
                                                    disabled={loading}
                                                    className="flex items-center gap-2 px-4 py-2 bg-gray-900 hover:bg-black text-white rounded-lg text-sm font-semibold transition-all shadow-lg disabled:opacity-50"
                                                >
                                                    {loading ? <lucide.Loader2 className="w-4 h-4 animate-spin" /> : <lucide.Sparkles className="w-4 h-4" />}
                                                    Ask AI Strategist
                                                </button>
                                            )}
                                        </div>

                                        {error && (
                                            <div className="p-4 mb-4 text-sm text-red-600 bg-red-50 rounded-xl border border-red-100 flex items-center gap-2">
                                                <lucide.AlertCircle className="w-4 h-4" /> {error}
                                            </div>
                                        )}

                                        {aiAnalysis[activeId] && (
                                            <div className="p-6 rounded-2xl bg-gray-50 border border-gray-100 animate-in">
                                                <div className="text-sm text-gray-700 leading-relaxed whitespace-pre-line">
                                                    {aiAnalysis[activeId]}
                                                </div>
                                                <button 
                                                    onClick={() => generateAiInsights(activeId)}
                                                    className="mt-4 text-xs font-bold text-blue-600 hover:text-blue-700 uppercase tracking-tighter"
                                                >
                                                    Refine Analysis →
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
